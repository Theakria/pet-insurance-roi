<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短险投放ROI测算小工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #070e18 0%, #0a1628 50%, #0d1b2a 100%);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  color: #e0e8f0;
  padding: 24px 16px;
}

.mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace; }

.container { max-width: 720px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.header-icon {
  width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1a73e8, #4fc3f7); font-size: 20px; flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
.header p { font-size: 11px; color: #4a6a8a; margin-top: 2px; }

/* Cards */
.card {
  background: linear-gradient(135deg, #0b1929, #0f2137); border: 1px solid #1a2f4a;
  border-radius: 14px; padding: 20px; margin-bottom: 20px;
}
.card-title { font-size: 14px; font-weight: 600; color: #4fc3f7; margin-bottom: 14px; }

/* Input grid */
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
.input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.input-row label { font-size: 13px; color: #8a9bb5; min-width: 120px; }
.input-row input[type="number"] {
  width: 80px; padding: 6px 8px; border: 1px solid #2a3a5c; border-radius: 6px;
  background: #0d1b2a; color: #e0e8f0; font-size: 13px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
  text-align: right; outline: none; transition: border-color 0.2s;
}
.input-row input[type="number"]:focus { border-color: #4fc3f7; }
.input-row .suffix { font-size: 12px; color: #5a7a9e; }

/* Summary bar */
.summary-bar {
  margin-top: 8px; padding: 8px 12px; background: #0a1520; border-radius: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.summary-bar .label { font-size: 12px; color: #6a8caa; }
.summary-bar .value { font-size: 13px; font-weight: 700; color: #ffa726; }

/* Retention */
.retention-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.retention-header .btns { display: flex; gap: 8px; }
.small-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid #2a3a5c; cursor: pointer;
  background: #0d1b2a; color: #6a8caa; font-size: 11px; font-family: inherit;
  transition: all 0.2s;
}
.small-btn.active { background: #1a3a5f; color: #4fc3f7; border-color: #1e3a5f; }
.small-btn:hover { border-color: #4fc3f7; }

.bar-chart { display: flex; gap: 1px; height: 40px; align-items: flex-end; margin-bottom: 6px; }
.bar-chart .bar {
  flex: 1; border-radius: 2px 2px 0 0; transition: height 0.3s; min-width: 2px; cursor: pointer;
}
.bar-chart .bar:hover { opacity: 0.8; }
.bar-labels { display: flex; justify-content: space-between; font-size: 10px; color: #4a6a8a; }

/* Phase editor */
.phase-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.phase-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.phase-label { font-size: 12px; color: #8a9bb5; width: 140px; }
.phase-row input[type="range"] { flex: 1; accent-color: var(--phase-color, #3498db); height: 4px; cursor: pointer; }
.phase-row input[type="range"]:active { cursor: grabbing; }
.phase-value { font-size: 12px; font-weight: 700; width: 44px; text-align: right; }

/* Monthly editor */
.monthly-grid { max-height: 300px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px 12px; }
.monthly-item { display: flex; align-items: center; gap: 4px; }
.monthly-item span.m-label { font-size: 10px; color: #4a6a8a; width: 28px; }
.monthly-item input {
  width: 44px; padding: 3px 4px; border: 1px solid #1e3a5f; border-radius: 4px;
  background: #0a1520; color: #e0e8f0; font-size: 11px; text-align: right;
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Courier New', monospace; outline: none;
}
.monthly-item input:focus { border-color: #4fc3f7; }
.monthly-item span.pct { font-size: 10px; color: #4a6a8a; }

/* Edit mode tabs */
.edit-tabs { display: flex; gap: 8px; margin-bottom: 12px; margin-top: 16px; }

/* ROI Gauges */
.gauge { margin-bottom: 16px; }
.gauge-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.gauge-label { font-size: 13px; color: #8a9bb5; }
.gauge-value { font-size: 18px; font-weight: 700; }
.gauge-track { height: 6px; background: #1a2940; border-radius: 3px; overflow: hidden; position: relative; }
.gauge-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.3s; }
.gauge-marker {
  position: absolute; top: -2px; bottom: -2px; width: 2px; background: #ffffff44; border-radius: 1px;
}

/* Metric cards */
.metrics { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.metric {
  background: linear-gradient(135deg, #0f2137, #162d4a); border: 1px solid #1e3a5f;
  border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 140px;
}
.metric .m-label { font-size: 11px; color: #6a8caa; margin-bottom: 6px; }
.metric .m-value { font-size: 22px; font-weight: 700; }
.metric .m-sub { font-size: 11px; color: #4a6a8a; margin-top: 4px; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  padding: 8px 6px; border-bottom: 1px solid #1a2f4a; color: #6a8caa; font-weight: 500; text-align: right;
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: 8px 6px; border-bottom: 1px solid #111d2e; text-align: right;
}
.data-table td:first-child { text-align: left; color: #8a9bb5; font-weight: 600; }

/* Monthly detail table */
.detail-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.detail-table th {
  padding: 6px 4px; border-bottom: 1px solid #1a2f4a; color: #6a8caa; font-weight: 500;
  text-align: right; position: sticky; top: 0; background: #0b1929; z-index: 1;
}
.detail-table th:first-child { text-align: left; }
.detail-table td { padding: 5px 4px; border-bottom: 1px solid #111d2e; text-align: right; }
.detail-table td:first-child { text-align: left; font-size: 10px; }
.detail-table tr.year-end { background: #1a2f4a22; }
.detail-table tr.renewal { background: #27ae6011; }

/* Collapsible */
.collapse-btn {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  background: none; border: none; cursor: pointer; padding: 0; color: inherit;
}
.collapse-arrow { color: #4a6a8a; font-size: 18px; transition: transform 0.2s; }
.collapse-arrow.open { transform: rotate(180deg); }

.detail-wrap { margin-top: 12px; max-height: 400px; overflow-y: auto; }

/* Confirm button */
.confirm-btn {
  width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, #1a73e8, #4fc3f7); color: #fff;
  font-size: 16px; font-weight: 700; font-family: inherit; letter-spacing: 1px;
  margin-bottom: 20px; transition: all 0.2s; box-shadow: 0 4px 16px #1a73e833;
}
.confirm-btn:hover { box-shadow: 0 6px 24px #1a73e855; transform: translateY(-1px); }
.confirm-btn:active { transform: translateY(0); }
.confirm-btn.changed {
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 16px #1a73e833; }
  50% { box-shadow: 0 4px 24px #4fc3f788; }
}

/* Output area */
.output-area { transition: opacity 0.3s; }
.output-area.stale { opacity: 0.35; }

/* Footer */
.footer { text-align: center; font-size: 11px; color: #2a3a5c; padding: 12px 0 24px; }

/* Responsive */
@media (max-width: 500px) {
  .input-grid { grid-template-columns: 1fr; }
  .metrics { flex-direction: column; }
  .monthly-grid { grid-template-columns: 1fr 1fr; }
  .input-row label { min-width: 90px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-icon" style="background:none;overflow:hidden;padding:0"><img src="mascot.png" style="width:40px;height:40px;object-fit:cover;border-radius:12px;display:block"></div>
    <div>
      <h1>短险投放ROI测算小工具</h1>
      <p>3年用户全生命周期模型 · 实时计算</p>
    </div>
  </div>

  <!-- Premium Label -->
  <div id="premiumLabel"></div>

  <!-- Core Params -->
  <div class="card">
    <div class="card-title">核心参数</div>
    <div class="input-grid" id="params"></div>
    <div id="yearCostArea"></div>
    <div class="summary-bar">
      <span class="label">综合成本率 / 毛利率</span>
      <span class="value mono" id="costRateDisplay"></span>
    </div>
  </div>

  <!-- Retention -->
  <div class="card">
    <div class="retention-header">
      <div class="card-title" style="margin-bottom:0">留存率曲线（M0-M35）</div>
    </div>
    <div style="font-size:12px;color:#6a8caa;margin-bottom:10px;line-height:1.6">
      默认采用标准留存模型：转商50% → 逐月爬升至98% → 续保年首月衰减后恢复。
      <span style="color:#4fc3f7;cursor:pointer;border-bottom:1px dashed #4fc3f7" onclick="if(!state.showRetention)toggleRetention()">点击下方按钮可自定义调整 ↓</span>
    </div>
    <div class="bar-chart" id="barChart"></div>
    <div class="bar-labels" style="margin-bottom:10px"><span>M0 转商</span><span>M11 首年末</span><span>M23 次年末</span><span>M35 三年末</span></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="small-btn" id="btnToggleRet" onclick="toggleRetention()" style="padding:8px 20px;font-size:12px;border-radius:8px">✏️ 自定义留存率</button>
      <button class="small-btn" id="btnReset" onclick="resetRetention()" style="padding:8px 16px;font-size:12px;border-radius:8px">↺ 恢复默认</button>
    </div>
    <div id="retentionEditor" style="display:none"></div>
  </div>

  <!-- Confirm Button -->
  <button class="confirm-btn" id="confirmBtn" onclick="confirmCalc()">确认计算</button>

  <!-- Output Area -->
  <div class="output-area" id="outputArea" style="display:none">

  <!-- ROI Gauges -->
  <div class="card">
    <div class="card-title">ROI 测算结果</div>
    <div id="gauges"></div>
  </div>

  <!-- Metric Cards -->
  <div class="metrics" id="metricCards"></div>

  <!-- Year Breakdown -->
  <div class="card">
    <div class="card-title">年度明细</div>
    <table class="data-table" id="yearTable"></table>
  </div>

  <!-- Monthly Detail -->
  <div class="card">
    <button class="collapse-btn" onclick="toggleMonthly()">
      <span class="card-title" style="margin-bottom:0">逐月明细（M0-M35）</span>
      <span class="collapse-arrow" id="monthlyArrow">▾</span>
    </button>
    <div id="monthlyDetail" style="display:none"></div>
  </div>

  </div><!-- /outputArea -->

  <div class="footer">短险投放ROI测算小工具 · 基于3年用户全生命周期模型</div>
</div>

<script>
// ── State ──
const DEFAULT_RETENTION = [
  0.50,0.80,0.85,0.88,0.90,0.92,0.95,0.95,0.95,0.95,0.98,0.98,
  0.78,0.90,0.95,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,
  0.82,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,0.98,
];

const PHASES = [
  { label:"转商首月 M0", range:[0,0], color:"#e74c3c" },
  { label:"首年爬坡 M1-M5", range:[1,5], color:"#e67e22" },
  { label:"首年稳定 M6-M11", range:[6,11], color:"#f39c12" },
  { label:"续保Y1首月 M12", range:[12,12], color:"#27ae60" },
  { label:"续保Y1 M13-M23", range:[13,23], color:"#2ecc71" },
  { label:"续保Y2首月 M24", range:[24,24], color:"#2980b9" },
  { label:"续保Y2 M25-M35", range:[25,35], color:"#3498db" },
];

const MONTH_LABELS = Array.from({length:36}, (_,i) => {
  if(i===0) return "M0(转商)";
  if(i===11) return "M11(EOY1)";
  if(i===12) return "M12(续保Y1)";
  if(i===23) return "M23(EOY2)";
  if(i===24) return "M24(续保Y2)";
  if(i===35) return "M35(EOY3)";
  return `M${i}`;
});

let state = {
  premium: 78.9, acqCost: 140, convRate: 50, lossRatio: 60, expenseRate: 4, commission: 3,
  // Y2/Y3 cost overrides — null means follow Y1
  y2Loss: null, y2Exp: null, y2Comm: null,
  y3Loss: null, y3Exp: null, y3Comm: null,
  showYearCost: false,
  retention: [...DEFAULT_RETENTION],
  showRetention: false, showMonthly: false, editMode: "phase",
};

// ── Compute ──
function compute() {
  const { premium, acqCost, retention } = state;
  const conv = state.convRate / 100;

  // Per-year cost assumptions (Y2/Y3 fall back to Y1 if null)
  const y1L = state.lossRatio / 100, y1E = state.expenseRate / 100, y1C = state.commission / 100;
  const y2L = (state.y2Loss ?? state.lossRatio) / 100, y2E = (state.y2Exp ?? state.expenseRate) / 100, y2C = (state.y2Comm ?? state.commission) / 100;
  const y3L = (state.y3Loss ?? state.lossRatio) / 100, y3E = (state.y3Exp ?? state.expenseRate) / 100, y3C = (state.y3Comm ?? state.commission) / 100;
  const mr1 = 1 - y1L - y1E - y1C;
  const mr2 = 1 - y2L - y2E - y2C;
  const mr3 = 1 - y3L - y3E - y3C;

  let cumRet = conv;
  // Keep M0 in retention array synced with convRate
  retention[0] = conv;
  const monthly = [];
  for (let m = 0; m < 36; m++) {
    if (m === 0) cumRet = conv; else cumRet *= retention[m];
    monthly.push({ month: m, ret: retention[m], cumRet, prem: premium * cumRet });
  }

  const sum = (a, b) => monthly.slice(a, b).reduce((s, r) => s + r.prem, 0);
  const y1P = sum(0,12), y2P = sum(12,24), y3P = sum(24,36);
  const y1M = y1P * mr1, y2M = y2P * mr2, y3M = y3P * mr3;
  const c1 = y1M, c2 = c1 + y2M, c3 = c2 + y3M;
  const cost = acqCost || 1;

  return {
    monthly,
    mr1, mr2, mr3,
    cr1: y1L+y1E+y1C, cr2: y2L+y2E+y2C, cr3: y3L+y3E+y3C,
    y1P, y2P, y3P, y1M, y2M, y3M, c1, c2, c3,
    roi1: c1/cost, roi2: c2/cost, roi3: c3/cost,
    be80: c3/0.8, be100: c3/1.0,
  };
}

// ── Helpers ──
const pct = v => `${(v*100).toFixed(1)}%`;
const yuan = v => `¥${v.toFixed(1)}`;
function roiColor(v) {
  if (v >= 1) return "#00e676";
  if (v >= 0.8) return "#4fc3f7";
  if (v >= 0.5) return "#ffa726";
  return "#ef5350";
}
function getPhase(i) { return PHASES.find(p => i >= p.range[0] && i <= p.range[1]); }

// ── Render ──
let _paramsRendered = false;

function render() {
  renderPremiumLabel();
  renderParams();
  renderBarChart();
  renderRetentionEditor();
  const r = compute();
  renderCostRate(r);
  if (!state.dirty && document.getElementById("outputArea").style.display !== "none") {
    renderOutput();
  }
}

// Lightweight update — only touches values, never rebuilds DOM structure
function lightUpdate() {
  renderPremiumLabel();
  renderBarChart();
  const r = compute();
  renderCostRate(r);
  // Update phase values if visible
  if (state.showRetention && state.editMode === 'phase') {
    PHASES.forEach((p, pi) => {
      const valEl = document.getElementById('phaseVal' + pi);
      const rangeEl = document.getElementById('phaseRange' + pi);
      if (valEl) valEl.textContent = pct(state.retention[p.range[0]]);
      if (rangeEl) rangeEl.value = Math.round(state.retention[p.range[0]] * 100);
    });
  }
}

function renderPremiumLabel() {
  document.getElementById("premiumLabel").innerHTML = `
    <div style="display:inline-block;padding:8px 18px;border-radius:8px;background:linear-gradient(135deg,#1a3a5f,#1e4a6f);
      border:1px solid #1e3a5f;font-size:14px;font-weight:600;color:#4fc3f7;margin-bottom:16px">
      保费 ${state.premium}元/月
    </div>`;
}

function renderParams() {
  const fields = [
    { label:"单期保费", key:"premium", step:0.1, suffix:"元" },
    { label:"获客成本", key:"acqCost", step:5, suffix:"元" },
    { label:"转商率", key:"convRate", step:1, suffix:"%" },
    { label:"赔付率", key:"lossRatio", step:1, suffix:"%" },
    { label:"其他费用率", key:"expenseRate", step:1, suffix:"%" },
    { label:"渠道佣金", key:"commission", step:1, suffix:"%" },
  ];
  document.getElementById("params").innerHTML = fields.map(f =>
    `<div class="input-row">
      <label>${f.label}</label>
      <input type="number" value="${state[f.key]}" step="${f.step}" min="0"
        oninput="updateParam('${f.key}', this.value)" class="mono">
      <span class="suffix">${f.suffix}</span>
    </div>`
  ).join("");

  // Per-year cost section
  let ycHtml = `<div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:12px;color:#6a8caa">次年/第三年成本假设与首年${state.showYearCost ? '不同' : '一致'}</span>
    <button class="small-btn ${state.showYearCost?'active':''}" onclick="toggleYearCost()" style="padding:6px 14px;font-size:11px;border-radius:6px">
      ${state.showYearCost ? '↩ 恢复与首年一致' : '⚙️ 分年调整'}
    </button>
  </div>`;

  if (state.showYearCost) {
    const yrFields = [
      { yr:"Y2 次年", lKey:"y2Loss", eKey:"y2Exp", cKey:"y2Comm" },
      { yr:"Y3 第三年", lKey:"y3Loss", eKey:"y3Exp", cKey:"y3Comm" },
    ];
    ycHtml += `<div style="margin-top:12px;padding:12px;background:#0a1520;border-radius:10px">`;
    for (const yf of yrFields) {
      const lv = state[yf.lKey] ?? state.lossRatio;
      const ev = state[yf.eKey] ?? state.expenseRate;
      const cv = state[yf.cKey] ?? state.commission;
      const mr = 1 - lv/100 - ev/100 - cv/100;
      ycHtml += `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;color:#4fc3f7;margin-bottom:6px">${yf.yr}
            <span style="font-weight:400;color:#4a6a8a;margin-left:8px">毛利率 ${pct(mr)}</span>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <div class="input-row" style="margin-bottom:0">
              <label style="min-width:50px;font-size:11px">赔付率</label>
              <input type="number" value="${lv}" step="1" min="0" style="width:54px;padding:4px 6px;font-size:11px"
                oninput="updateYearParam('${yf.lKey}', this.value)" class="mono">
              <span class="suffix">%</span>
            </div>
            <div class="input-row" style="margin-bottom:0">
              <label style="min-width:50px;font-size:11px">费用率</label>
              <input type="number" value="${ev}" step="1" min="0" style="width:54px;padding:4px 6px;font-size:11px"
                oninput="updateYearParam('${yf.eKey}', this.value)" class="mono">
              <span class="suffix">%</span>
            </div>
            <div class="input-row" style="margin-bottom:0">
              <label style="min-width:50px;font-size:11px">佣金</label>
              <input type="number" value="${cv}" step="1" min="0" style="width:54px;padding:4px 6px;font-size:11px"
                oninput="updateYearParam('${yf.cKey}', this.value)" class="mono">
              <span class="suffix">%</span>
            </div>
          </div>
        </div>`;
    }
    ycHtml += `</div>`;
  }

  document.getElementById("yearCostArea").innerHTML = ycHtml;
}

function updateParam(key, val) {
  state[key] = parseFloat(val) || 0;
  if (key === 'convRate') state.retention[0] = state.convRate / 100;
  if (['lossRatio','expenseRate','commission'].includes(key) && !state.showYearCost) {
    if (key === 'lossRatio') { state.y2Loss = null; state.y3Loss = null; }
    if (key === 'expenseRate') { state.y2Exp = null; state.y3Exp = null; }
    if (key === 'commission') { state.y2Comm = null; state.y3Comm = null; }
  }
  markStale();
  lightUpdate();
}

function toggleYearCost() {
  state.showYearCost = !state.showYearCost;
  if (!state.showYearCost) {
    // Reset Y2/Y3 to follow Y1
    state.y2Loss = null; state.y2Exp = null; state.y2Comm = null;
    state.y3Loss = null; state.y3Exp = null; state.y3Comm = null;
  }
  markStale();
  render();
}

function updateYearParam(key, val) {
  state[key] = parseFloat(val) || 0;
  markStale();
  lightUpdate();
}

function markStale() {
  state.dirty = true;
  const out = document.getElementById("outputArea");
  if (out.style.display !== "none") out.classList.add("stale");
  document.getElementById("confirmBtn").classList.add("changed");
}

function confirmCalc() {
  state.dirty = false;
  const out = document.getElementById("outputArea");
  out.style.display = "block";
  out.classList.remove("stale");
  document.getElementById("confirmBtn").classList.remove("changed");
  renderOutput();
  out.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderOutput() {
  const r = compute();
  renderCostRate(r);
  renderGauges(r);
  renderMetrics(r);
  renderYearTable(r);
  if (state.showMonthly) renderMonthlyDetail(r);
}

function renderCostRate(r) {
  if (state.showYearCost) {
    document.getElementById("costRateDisplay").innerHTML =
      `Y1 ${pct(r.cr1)}/${pct(r.mr1)} · Y2 ${pct(r.cr2)}/${pct(r.mr2)} · Y3 ${pct(r.cr3)}/${pct(r.mr3)}`;
  } else {
    document.getElementById("costRateDisplay").textContent = `${pct(r.cr1)} / ${pct(r.mr1)}`;
  }
}

function renderBarChart() {
  const container = document.getElementById("barChart");
  const bars = container.children;
  if (bars.length === 36) {
    // Update in-place for smooth transitions
    state.retention.forEach((v, i) => {
      bars[i].style.height = `${v * 100}%`;
      bars[i].title = `M${i}: ${pct(v)}`;
    });
  } else {
    // First render
    container.innerHTML = state.retention.map((v, i) => {
      const phase = getPhase(i);
      return `<div class="bar" style="height:${v*100}%;background:${phase?.color||'#3498db'}cc" title="M${i}: ${pct(v)}"></div>`;
    }).join("");
  }
}

function toggleRetention() {
  state.showRetention = !state.showRetention;
  document.getElementById("btnToggleRet").classList.toggle("active", state.showRetention);
  document.getElementById("btnToggleRet").innerHTML = state.showRetention ? "📊 收起编辑" : "✏️ 自定义留存率";
  render();
}

function resetRetention() {
  state.retention = [...DEFAULT_RETENTION]; markStale(); render();
}

function renderRetentionEditor() {
  const wrap = document.getElementById("retentionEditor");
  if (!state.showRetention) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";

  let html = `<div class="edit-tabs">
    <button class="small-btn ${state.editMode==='phase'?'active':''}" onclick="setEditMode('phase')">按阶段调整</button>
    <button class="small-btn ${state.editMode==='monthly'?'active':''}" onclick="setEditMode('monthly')">逐月调整</button>
  </div>`;

  if (state.editMode === "phase") {
    html += PHASES.map((p, pi) =>
      `<div class="phase-row">
        <div class="phase-dot" style="background:${p.color}"></div>
        <span class="phase-label">${p.label}</span>
        <input type="range" id="phaseRange${pi}" min="0" max="100" value="${Math.round(state.retention[p.range[0]]*100)}"
          style="--phase-color:${p.color}" oninput="updatePhase(${p.range[0]},${p.range[1]},this.value)">
        <span class="phase-value mono" id="phaseVal${pi}" style="color:${p.color}">${pct(state.retention[p.range[0]])}</span>
      </div>`
    ).join("");
  } else {
    html += `<div class="monthly-grid">`;
    html += state.retention.map((v, i) =>
      `<div class="monthly-item">
        <span class="m-label">M${i}</span>
        <input type="number" min="0" max="100" value="${Math.round(v*100)}" oninput="updateMonth(${i},this.value)" class="mono">
        <span class="pct">%</span>
      </div>`
    ).join("");
    html += `</div>`;
  }
  wrap.innerHTML = html;
}

function setEditMode(mode) { state.editMode = mode; render(); }

function updatePhase(start, end, val) {
  const v = parseInt(val) / 100;
  for (let i = start; i <= end; i++) state.retention[i] = v;
  if (start === 0) {
    state.convRate = parseInt(val);
    // Sync the convRate input box directly
    const inputs = document.getElementById("params").querySelectorAll('input[type="number"]');
    if (inputs[2]) inputs[2].value = state.convRate; // 3rd input = convRate
  }
  markStale();
  lightUpdate();
}

function updateMonth(idx, val) {
  state.retention[idx] = parseInt(val) / 100;
  if (idx === 0) {
    state.convRate = parseInt(val);
    const inputs = document.getElementById("params").querySelectorAll('input[type="number"]');
    if (inputs[2]) inputs[2].value = state.convRate;
  }
  markStale();
  lightUpdate();
}

function renderGauges(r) {
  const gauges = [
    { label:"1年ROI", value:r.roi1 },
    { label:"2年ROI", value:r.roi2 },
    { label:"3年ROI", value:r.roi3 },
  ];
  document.getElementById("gauges").innerHTML = gauges.map(g => {
    const color = roiColor(g.value);
    const width = Math.min(g.value / 1.2 * 100, 100);
    const markerPos = (0.8 / 1.2) * 100;
    return `<div class="gauge">
      <div class="gauge-header">
        <span class="gauge-label">${g.label}</span>
        <span class="gauge-value mono" style="color:${color}">${pct(g.value)}</span>
      </div>
      <div class="gauge-track">
        <div class="gauge-fill" style="width:${width}%;background:linear-gradient(90deg,${color}88,${color})"></div>
        <div class="gauge-marker" style="left:${markerPos}%"></div>
      </div>
    </div>`;
  }).join("");
}

function renderMetrics(r) {
  document.getElementById("metricCards").innerHTML = `
    <div class="metric">
      <div class="m-label">3年累计毛利</div>
      <div class="m-value mono">${yuan(r.c3)}</div>
      <div class="m-sub">Y1: ${yuan(r.c1)} → Y2: ${yuan(r.c2)}</div>
    </div>
    <div class="metric">
      <div class="m-label">ROI=100% 成本上限</div>
      <div class="m-value mono" style="color:#00e676">${yuan(r.be100)}</div>
      <div class="m-sub">完全回本线</div>
    </div>
    <div class="metric">
      <div class="m-label">ROI=80% 成本上限</div>
      <div class="m-value mono" style="color:#4fc3f7">${yuan(r.be80)}</div>
      <div class="m-sub">盈亏平衡线</div>
    </div>`;
}

function renderYearTable(r) {
  const rows = [
    ["Y1", r.y1P, r.mr1, r.y1M, r.c1, r.roi1],
    ["Y2", r.y2P, r.mr2, r.y2M, r.c2, r.roi2],
    ["Y3", r.y3P, r.mr3, r.y3M, r.c3, r.roi3],
  ];
  document.getElementById("yearTable").innerHTML = `
    <thead><tr>
      <th style="text-align:left"></th><th>保费实收</th><th>毛利率</th><th>毛利</th><th>累计毛利</th><th>累计ROI</th>
    </tr></thead>
    <tbody>${rows.map(([yr, p, mr, m, c, roi]) => `
      <tr>
        <td>${yr}</td>
        <td class="mono">${yuan(p)}</td>
        <td class="mono" style="color:#6a8caa">${pct(mr)}</td>
        <td class="mono">${yuan(m)}</td>
        <td class="mono" style="font-weight:700">${yuan(c)}</td>
        <td class="mono" style="font-weight:700;color:${roiColor(roi)}">${pct(roi)}</td>
      </tr>`).join("")}
    </tbody>`;
}

function toggleMonthly() {
  state.showMonthly = !state.showMonthly;
  document.getElementById("monthlyArrow").classList.toggle("open", state.showMonthly);
  const wrap = document.getElementById("monthlyDetail");
  if (state.showMonthly) {
    wrap.style.display = "block";
    renderMonthlyDetail(compute());
  } else {
    wrap.style.display = "none";
  }
}

function renderMonthlyDetail(r) {
  let cumPrem = 0;
  const rows = r.monthly.map((m, i) => {
    cumPrem += m.prem;
    const isYE = i===11||i===23||i===35;
    const isRN = i===12||i===24;
    const cls = isYE ? 'year-end' : isRN ? 'renewal' : '';
    const lc = isYE ? 'color:#ffa726;font-weight:600' : isRN ? 'color:#27ae60;font-weight:600' : 'color:#8a9bb5';
    return `<tr class="${cls}">
      <td style="${lc}">${MONTH_LABELS[i]}</td>
      <td class="mono">${pct(m.ret)}</td>
      <td class="mono">${pct(m.cumRet)}</td>
      <td class="mono">${yuan(m.prem)}</td>
      <td class="mono" style="font-weight:600">${yuan(cumPrem)}</td>
    </tr>`;
  }).join("");

  document.getElementById("monthlyDetail").innerHTML = `
    <div class="detail-wrap">
      <table class="detail-table">
        <thead><tr>
          <th style="text-align:left">月份</th><th>月留存率</th><th>累计留存率</th><th>当月保费</th><th>累计保费</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Init ──
render();
</script>
</body>
</html>
